<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монополия</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Монополия</h1>
            <div class="balance-info">
                <span>💰 <span id="current-balance">0</span></span>
                <button id="apply-start-balance" class="btn-gold">Изменить</button>
            </div>
        </header>

        <div class="board">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="controls">
            <button id="roll-dice" class="btn-gold">🎲 Бросить кубик</button>
            <div class="dice-result" id="dice-result">0</div>
            <button id="reset-btn" class="btn-danger">🔄 Новая игра</button>
        </div>

        <div class="history">
            <h3>📋 Хроника</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- Модалка задания -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Клетка <span id="cell-number"></span></h2>
            <p id="task-description"></p>
            <div class="balance-input">
                <label>Новый баланс:</label>
                <input type="number" id="new-balance" step="100">
            </div>
            <div class="modal-buttons">
                <button id="complete-task" class="btn-success">✅ Выполнено</button>
                <button id="fail-task" class="btn-danger">⚠️ Провал</button>
            </div>
        </div>
    </div>

    <!-- Модалка конца игры -->
    <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Игра завершена</h2>
            <p id="final-message"></p>
            <p>Итоговый баланс: <span id="final-balance"></span> ₽</p>
            <button id="completion-reset-btn" class="btn-gold">🔄 Новая игра</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
