<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лаборатория безумного учёного</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="header">
            <h1 class="lab-title">⚗️ Лаборатория безумного учёного</h1>
            <div class="level-indicator">Этап <span id="current-level">1</span>/30</div>
            <div class="balance-panel">
                <span class="label">🔬 Очки науки</span>
                <span class="value" id="current-balance">0</span>
                <button id="apply-start-balance" class="btn-neon">✎</button>
            </div>
        </header>

        <div class="cards-container" id="cards-container"></div>

        <div class="stats-panel" id="pool-stats"></div>

        <div class="history-panel">
            <h2>📋 Журнал экспериментов</h2>
            <div id="history-list" class="history-list"></div>
        </div>

        <div class="control-panel">
            <button id="reset-btn" class="btn-danger hidden">🔄 Новый эксперимент</button>
        </div>
    </div>

    <!-- Модалка задания -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🧪 Протокол испытания</h2>
            <p id="task-description"></p>
            <div class="balance-input">
                <label>Новый баланс после опыта:</label>
                <input type="number" id="new-balance" step="100">
            </div>
            <div class="modal-buttons">
                <button id="complete-task" class="btn-success">✅ Успех</button>
                <button id="fail-task" class="btn-danger">💥 Взрыв</button>
            </div>
        </div>
    </div>

    <!-- Модалка завершения -->
    <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Эксперимент завершён</h2>
            <p id="final-message"></p>
            <p>Итоговый баланс: <span id="final-balance"></span> 🔬</p>
            <button id="completion-reset-btn" class="btn-neon">🔄 Новый эксперимент</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
