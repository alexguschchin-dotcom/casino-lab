<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Своя игра · Казино-квиз</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div class="game-container">
        <header>
            <h1 class="game-title">
                <span class="title-glow">Своя игра</span>
                <span class="title-casino">· Казино-квиз</span>
            </h1>
            <div class="score-board">
                <i class="fas fa-coins"></i>
                <span id="total-score">0</span>
            </div>
        </header>

        <div class="themes-grid" id="themes-grid"></div>

        <!-- Блок для лидерборда и выбора отвечающего -->
        <div class="game-footer">
            <div class="leaderboard-section">
                <h3><i class="fas fa-trophy"></i> Таблица лидеров</h3>
                <div class="leaderboard" id="leaderboard">
                    <div class="leader-entry" data-player="Alex">
                        <span class="player-name">Алексей</span>
                        <span class="player-score" id="leader-score-Alex">0</span>
                    </div>
                    <div class="leader-entry" data-player="Vika">
                        <span class="player-name">Вика</span>
                        <span class="player-score" id="leader-score-Vika">0</span>
                    </div>
                    <div class="leader-entry" data-player="Batya">
                        <span class="player-name">Батя</span>
                        <span class="player-score" id="leader-score-Batya">0</span>
                    </div>
                </div>
                <div class="balance-control">
                    <button id="change-balance" class="btn-secondary">Изменить баланс</button>
                    <div id="balance-input-container" class="hidden">
                        <input type="number" id="balance-amount" placeholder="Сумма">
                        <button id="apply-balance" class="btn-primary">Применить</button>
                    </div>
                </div>
            </div>
            <div class="active-player-section">
                <h3><i class="fas fa-user-check"></i> Кто отвечает?</h3>
                <div class="player-selector">
                    <button class="player-select-btn active" data-select="Alex">Алексей</button>
                    <button class="player-select-btn" data-select="Vika">Вика</button>
                    <button class="player-select-btn" data-select="Batya">Батя</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно с вопросами темы -->
    <div id="theme-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="theme-name">Тема</h2>
                <button class="close-modal" id="close-theme-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="questions-grid" id="questions-grid"></div>
        </div>
    </div>

    <!-- Карточка вопроса -->
    <div id="question-modal" class="modal hidden">
        <div class="question-card glass">
            <div class="question-header">
                <h3 id="question-category">Категория</h3>
                <span id="question-value">Стоимость: 0</span>
                <button class="close-modal" id="close-question-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="question-text" id="question-text">Текст вопроса</div>
            <div class="answer-area">
                <input type="text" id="answer-input" placeholder="Введите ваш ответ..." autocomplete="off">
                <button id="submit-answer" class="btn-primary">Ответить</button>
            </div>
            <div class="help-buttons">
                <button id="help-chat" class="help-btn"><i class="fas fa-comments"></i> Спросить чат</button>
                <button id="help-vika" class="help-btn"><i class="fas fa-user-ninja"></i> Спросить Вику</button>
                <button id="help-batya" class="help-btn"><i class="fas fa-user-tie"></i> Спросить Батю</button>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <!-- Модалка для выбора зрителя (помощь чата) -->
    <div id="viewer-modal" class="modal hidden">
        <div class="modal-content glass small">
            <h3>👥 Помощь чата</h3>
            <p>Введите ник зрителя, который поможет:</p>
            <input type="text" id="viewer-name" placeholder="Ник зрителя">
            <div class="modal-buttons">
                <button id="confirm-viewer" class="btn-primary">Подтвердить</button>
                <button id="cancel-viewer" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модалка результата -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content glass small">
            <h3 id="result-title"></h3>
            <p id="result-message"></p>
            <button id="close-result" class="btn-primary">Продолжить</button>
        </div>
    </div>

    <!-- Финальное поздравление -->
    <div id="congrats-modal" class="modal hidden">
        <div class="modal-content glass small">
            <h3>🏆 Поздравляем! 🏆</h3>
            <p>Вы ответили на все вопросы! Вы — настоящий знаток!</p>
            <button id="close-congrats" class="btn-primary">Отлично!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
