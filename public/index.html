<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Своя игра | Казино-квиз</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1><i class="fas fa-dice-d6"></i> Своя игра · Казино-квиз <i class="fas fa-trophy"></i></h1>
            <div class="score-board">💰 Счёт: <span id="score">0</span></div>
        </header>

        <div class="game-board" id="game-board">
            <!-- Таблица тем и сложностей будет создана JS -->
        </div>

        <div class="question-panel hidden" id="question-panel">
            <div class="question-card">
                <h2 id="question-text"></h2>
                <div class="task-info" id="task-info"></div>
                <div class="answer-area">
                    <input type="text" id="answer-input" placeholder="Введите ответ">
                    <button id="submit-answer">Ответить</button>
                </div>
                <div class="help-buttons">
                    <button id="help-chat">💬 Спросить чат (+60% сложности)</button>
                    <button id="help-vika">👩 Спросить Вику (+30%)</button>
                    <button id="help-batya">👨 Спросить Батю (+30%)</button>
                </div>
                <div class="help-result hidden" id="help-result"></div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="controls">
            <button id="reset-game" class="reset-btn">🔄 Новая игра</button>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <p id="modal-task"></p>
            <button id="close-modal">Продолжить</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
