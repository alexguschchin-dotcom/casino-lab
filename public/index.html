<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Империя знаний | Сокровища знаний</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="map-overlay"></div>
    <div id="toast" class="toast hidden"></div>
    <div id="flash-overlay" class="flash-overlay hidden"></div>

    <div class="game-container">
        <div class="compass-glow"></div>
        <header class="header">
            <div class="title-wrapper">
                <i class="fas fa-dragon"></i>
                <h1 class="title">Империя знаний</h1>
                <i class="fas fa-crown"></i>
            </div>
            <div class="level-indicator">
                <i class="fas fa-scroll"></i> 
                <span id="current-q">1</span>/<span id="total-q">39</span>
            </div>
            <button id="sound-toggle" class="sound-btn"><i class="fas fa-music"></i></button>
        </header>

        <!-- Прогресс в виде 3D-ленты -->
        <div class="journey-map">
            <div class="map-markers" id="map-markers"></div>
            <div class="map-progress-bar">
                <div class="map-track" id="map-track"></div>
            </div>
            <div class="map-labels">
                <span>🏁 Старт</span>
                <span>🏆 Финал</span>
            </div>
        </div>

        <!-- Вопрос с эффектом голограммы -->
        <div class="question-card" id="question-card">
            <div class="question-glow"></div>
            <div class="question-text" id="question-text">Загрузка...</div>
            <div class="options" id="options"></div>
        </div>

        <!-- Таблица лидеров с анимацией -->
        <div class="leaderboard">
            <h3><i class="fas fa-chart-line"></i> Таблица лидеров</h3>
            <div id="leaderboard-list"></div>
        </div>

        <!-- Карточки игроков с 3D-эффектом -->
        <div class="scoreboard">
            <div class="player-card" data-player="Alex">
                <div class="card-glow"></div>
                <i class="fas fa-user-astronaut avatar"></i>
                <span class="player-name">Алексей</span>
                <div class="streak-indicator" id="streak-Alex">🔥 0</div>
                <div class="player-stats">
                    <span class="player-score" id="score-Alex">0</span>
                    <span class="player-coins" id="coins-Alex">💰 0</span>
                </div>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Alex" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Alex" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Alex">⚔️ Ответить</button>
            </div>
            <div class="player-card" data-player="Vika">
                <div class="card-glow"></div>
                <i class="fas fa-user-ninja avatar"></i>
                <span class="player-name">Вика</span>
                <div class="streak-indicator" id="streak-Vika">🔥 0</div>
                <div class="player-stats">
                    <span class="player-score" id="score-Vika">0</span>
                    <span class="player-coins" id="coins-Vika">💰 0</span>
                </div>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Vika" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Vika" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Vika">⚔️ Ответить</button>
            </div>
            <div class="player-card" data-player="Batya">
                <div class="card-glow"></div>
                <i class="fas fa-user-tie avatar"></i>
                <span class="player-name">Батя</span>
                <div class="streak-indicator" id="streak-Batya">🔥 0</div>
                <div class="player-stats">
                    <span class="player-score" id="score-Batya">0</span>
                    <span class="player-coins" id="coins-Batya">💰 0</span>
                </div>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Batya" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Batya" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Batya">⚔️ Ответить</button>
            </div>
        </div>

        <div class="control-panel">
            <button id="reset-btn" class="btn-reset"><i class="fas fa-sync-alt"></i> Новая игра</button>
        </div>
    </div>

    <!-- Модалки -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <button id="close-modal" class="btn-close">Продолжить</button>
        </div>
    </div>

    <div id="hint-modal" class="modal hidden">
        <div class="modal-content">
            <h2>💡 Подсказка чата</h2>
            <p id="hint-text"></p>
            <button id="close-hint" class="btn-close">Понятно</button>
        </div>
    </div>

    <div id="gameover-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Игра окончена</h2>
            <div id="final-scores"></div>
            <button id="new-game-btn" class="btn-neon">Новая игра</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
