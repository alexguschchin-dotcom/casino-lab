<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монополия</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <!-- Верхняя панель -->
        <header>
            <div class="logo">MONOPOLY</div>
            <div class="balance">
                <i class="fas fa-coins"></i>
                <span id="current-balance">0</span>
                <button id="apply-start-balance" class="btn-gold"><i class="fas fa-pen"></i></button>
            </div>
        </header>

        <div class="main-area">
            <!-- Игровое поле -->
            <div class="board-container">
                <canvas id="boardCanvas" width="800" height="800"></canvas>
            </div>

            <!-- Правая панель -->
            <div class="right-panel">
                <div class="dice-box">
                    <div class="dice" id="dice1">🎲</div>
                    <div class="dice" id="dice2">🎲</div>
                </div>
                <button id="roll-dice" class="btn-primary">Бросить кубики</button>

                <div class="player-info">
                    <div class="player-token" id="playerToken">🚗</div>
                    <div class="player-stats">
                        <div>Ваша фишка</div>
                        <div id="player-position">Клетка 1</div>
                    </div>
                </div>

                <div class="history-title">📜 История</div>
                <div class="history-list" id="history-list"></div>

                <button id="reset-btn" class="btn-danger">🔄 Новая игра</button>
            </div>
        </div>
    </div>

    <!-- Модалка задания -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏦 Налоговая инспекция</h2>
            <p id="task-description"></p>
            <div class="balance-input">
                <label>Ваш новый баланс после сделки:</label>
                <input type="number" id="new-balance" step="100">
            </div>
            <div class="modal-buttons">
                <button id="complete-task" class="btn-success"><i class="fas fa-check"></i> Оплачено</button>
                <button id="fail-task" class="btn-danger"><i class="fas fa-times"></i> Банкрот</button>
            </div>
        </div>
    </div>

    <!-- Модалка окончания игры -->
    <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏁 Игра завершена</h2>
            <p id="final-message"></p>
            <p>Итоговый капитал: <span id="final-balance"></span> ₽</p>
            <button id="completion-reset-btn" class="btn-gold">🔄 Новая игра</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
