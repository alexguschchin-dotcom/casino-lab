<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Своя игра · Казино-квиз | Весенняя версия</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="spring-bg">
        <div class="flower flower-1"></div>
        <div class="flower flower-2"></div>
        <div class="flower flower-3"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="raindrop raindrop-1"></div>
        <div class="raindrop raindrop-2"></div>
    </div>

    <div class="game-container">
        <header>
            <h1 class="game-title">
                <span class="title-glow">Своя игра</span>
                <span class="title-casino">· Казино-квиз</span>
            </h1>
            <div class="score-board">
                <i class="fas fa-coins"></i>
                <span id="total-score">0</span>
            </div>
        </header>

        <div class="themes-grid" id="themes-grid"></div>

        <div class="players-leaderboard">
            <h3><i class="fas fa-trophy"></i> Таблица лидеров</h3>
            <div class="players-cards" id="players-cards">
                <div class="player-card" data-player="alex">
                    <i class="fas fa-user-astronaut"></i>
                    <span class="player-name">Алексей</span>
                    <span class="player-score" id="score-alex">0</span>
                    <div class="balance-controls">
                        <button class="balance-add" data-player="alex">+1000</button>
                        <button class="balance-sub" data-player="alex">-500</button>
                    </div>
                </div>
                <div class="player-card" data-player="vika">
                    <i class="fas fa-user-ninja"></i>
                    <span class="player-name">Вика</span>
                    <span class="player-score" id="score-vika">0</span>
                    <div class="balance-controls">
                        <button class="balance-add" data-player="vika">+1000</button>
                        <button class="balance-sub" data-player="vika">-500</button>
                    </div>
                </div>
                <div class="player-card" data-player="batya">
                    <i class="fas fa-user-tie"></i>
                    <span class="player-name">Батя</span>
                    <span class="player-score" id="score-batya">0</span>
                    <div class="balance-controls">
                        <button class="balance-add" data-player="batya">+1000</button>
                        <button class="balance-sub" data-player="batya">-500</button>
                    </div>
                </div>
            </div>
            <button id="reset-scores" class="btn-reset-scores"><i class="fas fa-sync-alt"></i> Сбросить счёт</button>
        </div>

        <footer>
            <p>🌸 Весенний квиз — цвети, играй, побеждай! 🌸</p>
        </footer>
    </div>

    <!-- Модалка с вопросами темы -->
    <div id="theme-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="theme-name">Тема</h2>
                <button class="close-modal" id="close-theme-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="questions-grid" id="questions-grid"></div>
        </div>
    </div>

    <!-- Карточка вопроса -->
    <div id="question-modal" class="modal hidden">
        <div class="question-card glass">
            <div class="question-header">
                <h3 id="question-category">Категория</h3>
                <span id="question-value">💰 0</span>
                <button class="close-modal" id="close-question-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="question-text" id="question-text">Текст вопроса</div>
            <div class="answer-area">
                <input type="text" id="answer-input" placeholder="Введите ваш ответ..." autocomplete="off">
                <button id="submit-answer" class="btn-primary">Ответить</button>
            </div>
            <div class="player-selector">
                <label>Кто отвечает:</label>
                <select id="answer-player">
                    <option value="alex">Алексей</option>
                    <option value="vika">Вика</option>
                    <option value="batya">Батя</option>
                </select>
            </div>
            <div class="help-buttons">
                <button id="help-chat" class="help-btn"><i class="fas fa-comments"></i> Спросить чат</button>
                <button id="help-vika" class="help-btn"><i class="fas fa-user-ninja"></i> Спросить Вику</button>
                <button id="help-batya" class="help-btn"><i class="fas fa-user-tie"></i> Спросить Батю</button>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <!-- Модалка для выбора зрителя (помощь чата) -->
    <div id="viewer-modal" class="modal hidden">
        <div class="modal-content glass small">
            <h3>👥 Помощь чата</h3>
            <p>Введите ник зрителя, который поможет:</p>
            <input type="text" id="viewer-name" placeholder="Ник зрителя">
            <div class="modal-buttons">
                <button id="confirm-viewer" class="btn-primary">Подтвердить</button>
                <button id="cancel-viewer" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модалка результата -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content glass small">
            <h3 id="result-title"></h3>
            <p id="result-message"></p>
            <button id="close-result" class="btn-primary">Продолжить</button>
        </div>
    </div>

    <!-- Модалка поздравления -->
    <div id="congrats-modal" class="modal hidden">
        <div class="modal-content glass congrats">
            <i class="fas fa-trophy"></i>
            <h2>Поздравляем!</h2>
            <p>Вы ответили на все вопросы! 🎉</p>
            <p>Вы — настоящий знаток!</p>
            <button id="new-game-congrats" class="btn-primary">Начать новую игру</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
