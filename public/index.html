<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍓 КЛУБНИЧНОЕ ПРИКЛЮЧЕНИЕ | Спаси ферму</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #ffb7c5 0%, #ff6f91 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные ягоды на фоне */
        .berry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle at 20% 40%, rgba(255,220,180,0.3) 3%, transparent 3.5%);
            background-size: 60px 60px;
            animation: floatBerries 25s linear infinite;
            z-index: 0;
        }

        @keyframes floatBerries {
            0% { background-position: 0 0; }
            100% { background-position: 120px 120px; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 245, 235, 0.94);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            padding: 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 2px solid #fff0e0;
            position: relative;
            z-index: 2;
            transition: all 0.2s;
        }

        /* Шапка */
        .header-stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: #a13e62dd;
            border-radius: 100px;
            padding: 12px 30px;
            margin-bottom: 30px;
            color: #fff2df;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .stat-card {
            background: #2d1e28;
            padding: 8px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .stat-card i {
            font-size: 1.5rem;
        }

        .energy-bar {
            background: #6b3e4a;
            border-radius: 30px;
            height: 10px;
            width: 180px;
            overflow: hidden;
        }

        .energy-fill {
            background: #ffcc66;
            width: 100%;
            height: 100%;
            transition: width 0.3s;
        }

        /* Сетка заданий */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 22px;
            margin: 30px 0;
        }

        .task-card {
            background: #fffef8;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-left: 8px solid #ff9f4a;
            transition: 0.1s linear;
            cursor: pointer;
        }

        .task-card.locked {
            opacity: 0.5;
            filter: grayscale(0.2);
            border-left-color: #aaa;
            cursor: not-allowed;
        }

        .task-card.completed {
            background: #dcf5d0;
            border-left-color: #2d862d;
            order: 1;
        }

        .task-card.active {
            background: #fff3e0;
            border-left-color: #e8436e;
            transform: scale(1.01);
            box-shadow: 0 0 0 2px #e8436e, 0 12px 24px rgba(0,0,0,0.15);
        }

        .task-title {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slot-badge {
            background: #f3b33d;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .task-desc {
            font-size: 0.9rem;
            color: #3e2a24;
            margin: 12px 0;
        }

        .task-reward {
            font-weight: bold;
            color: #c14a2e;
            margin-top: 10px;
        }

        .complete-btn {
            background: #48a148;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.1s;
            width: 100%;
        }

        .complete-btn:hover {
            background: #2e7d32;
            transform: scale(1.02);
        }

        /* Панель чата */
        .chat-panel {
            background: #2c1e28dd;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            margin-top: 35px;
            padding: 20px;
            color: #ffefcf;
        }

        .chat-messages {
            background: #1e0f15aa;
            border-radius: 32px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-message {
            background: #fffaec22;
            border-radius: 28px;
            padding: 6px 16px;
            width: fit-content;
            max-width: 90%;
            animation: fadeUp 0.2s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bonus-btn {
            background: #ffaa44;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.1s;
        }

        .bonus-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .combo-indicator {
            background: #eb9e3e;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            display: inline-block;
        }

        .footer-tip {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #422c22;
        }

        @media (max-width: 700px) {
            .container { padding: 16px; }
            .stat-card { font-size: 0.9rem; padding: 4px 16px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="berry-bg"></div>
<div class="container">
    <div class="header-stats">
        <div class="stat-card"><i class="fas fa-hourglass-half"></i> <span id="timerDisplay">01:30:00</span></div>
        <div class="stat-card"><i class="fas fa-trophy"></i> <span id="scoreDisplay">0</span> / 5000</div>
        <div class="stat-card"><i class="fas fa-bolt"></i> Энергия: <span id="energyVal">100</span>% <div class="energy-bar"><div id="energyFill" class="energy-fill" style="width:100%"></div></div></div>
        <div class="stat-card"><i class="fas fa-fire"></i> Комбо: <span id="comboCount">0</span></div>
    </div>

    <div id="tasksContainer" class="tasks-grid"></div>

    <div class="chat-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h3><i class="fas fa-comments"></i> КЛУБНИЧНЫЙ ЧАТ</h3>
            <button id="bonusChatBtn" class="bonus-btn" disabled><i class="fas fa-gift"></i> БОНУС ЧАТА (ост. 3)</button>
        </div>
        <div id="chatMessages" class="chat-messages">
            <div class="chat-message">🍓 Клубничка, спасай ферму! Выполняй задания в слотах Pragmatic!</div>
        </div>
    </div>
    <div class="footer-tip">
        ⚡ Энергия тратится на активацию задания (10% за выбор). Восстанавливается автоматически. Комбо: 3 задания подряд → x2 очков за следующие 2.
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  КЛУБНИЧНОЕ ПРИКЛЮЧЕНИЕ - 15 НОВЫХ СЛОТОВ PRAGMATIC PLAY
    // --------------------------------------------------------------
    (function(){
        // ---------- СПИСОК ЗАДАНИЙ (новые слоты, уникальные условия) ----------
        const TASKS_DATA = [
            { id:0, slot:"Wisdom of Athena", condition:"Один спин с множителем x20 и одновременно 3+ Scatter", baseReward:280, completed:false, active:false, desc:"Достигни x20 + 3 скаттера за один спин" },
            { id:1, slot:"Power of Thor Megaways", condition:"В бонусе собрать 5 молний подряд", baseReward:320, completed:false, active:false, desc:"Бонусная игра: 5 молниеносных сборов" },
            { id:2, slot:"5 Lions Megaways", condition:"Активировать бонус и получить 5 диких символов на одном барабане", baseReward:350, completed:false, active:false, desc:"В фриспинах 5 wilds на барабане" },
            { id:3, slot:"Juicy Fruits", condition:"Собрать 3 фруктовых бонуса за 15 минут", baseReward:300, completed:false, active:false, desc:"Лимит времени 15 минут на 3 бонуса" },
            { id:4, slot:"Fire Strike 2", condition:"Зажечь все 15 огней (заполнить экран Fire Strike)", baseReward:450, completed:false, active:false, desc:"Символы Fire Strike на всех позициях" },
            { id:5, slot:"Empty the Bank", condition:"Украсть банк (выиграть >200x ставки) в бонусе", baseReward:420, completed:false, active:false, desc:"Бонус Empty the Bank: профит >200x" },
            { id:6, slot:"Mysterious Egypt", condition:"Найти 3 саркофага в одном бонусе", baseReward:390, completed:false, active:false, desc:"Бонусная игра: 3 саркофага" },
            { id:7, slot:"Clover Gold", condition:"Получить 3 четырёхлистных клевера в основной игре", baseReward:260, completed:false, active:false, desc:"Три клевера в любых спинах" },
            { id:8, slot:"Buffalo King Megaways", condition:"Серия из 10 выигрышных спинов подряд", baseReward:410, completed:false, active:false, desc:"10 спинов подряд с выигрышем" },
            { id:9, slot:"Wild Walker", condition:"Зомби-символ проходит весь экран и даёт x15", baseReward:480, completed:false, active:false, desc:"Дикий зомби заполняет барабаны с множителем x15" },
            { id:10, slot:"Voodoo Magic", condition:"Купить бонус и получить множитель x50", baseReward:500, completed:false, active:false, desc:"Бонус куплен, множитель 50x" },
            { id:11, slot:"Leprechaun Carol", condition:"В бонусе собрать 100 монет", baseReward:370, completed:false, active:false, desc:"Накопить 100 монет в бонусной игре" },
            { id:12, slot:"John Hunter and the Tomb of the Scarab Queen", condition:"Пройти 4 уровня гробницы (бонусная игра)", baseReward:440, completed:false, active:false, desc:"Завершить 4 этапа" },
            { id:13, slot:"Mustang Gold", condition:"Собрать 3 жеребца на одном спине", baseReward:310, completed:false, active:false, desc:"Три логотипа Mustang в линии" },
            { id:14, slot:"The Great Chicken Escape", condition:"Помочь цыплёнку сбежать с множителем x25", baseReward:520, completed:false, active:false, desc:"Бонус с побегом цыплёнка и множителем 25x" }
        ];

        // Глобальное состояние игры
        let game = {
            tasks: JSON.parse(JSON.stringify(TASKS_DATA)),
            completedCount: 0,
            totalScore: 0,
            timeLeftSec: 90 * 60, // 90 минут
            energy: 100,
            combo: 0,           // количество подряд выполненных заданий
            doublePointsLeft: 0,  // сколько заданий будут с x2
            bonusChatUses: 3,
            gameActive: true,
            winFlag: false,
            timerInterval: null,
            energyRegenInterval: null,
            autoChatInterval: null
        };

        // DOM элементы
        const tasksContainer = document.getElementById('tasksContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const scoreSpan = document.getElementById('scoreDisplay');
        const energyValSpan = document.getElementById('energyVal');
        const energyFillDiv = document.getElementById('energyFill');
        const comboCountSpan = document.getElementById('comboCount');
        const bonusChatBtn = document.getElementById('bonusChatBtn');
        const chatDiv = document.getElementById('chatMessages');

        // Вспомогательные функции
        function addChatMessage(text, isBonus=false) {
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = isBonus ? `🎁 Чат: ${text}` : `🍓 ChatBot: ${text}`;
            chatDiv.appendChild(msg);
            msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if(chatDiv.children.length > 40) chatDiv.removeChild(chatDiv.children[0]);
        }

        function formatTime(sec) {
            let h = Math.floor(sec / 3600);
            let m = Math.floor((sec % 3600) / 60);
            let s = sec % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateUI() {
            timerDisplay.innerText = formatTime(game.timeLeftSec);
            scoreSpan.innerText = game.totalScore;
            energyValSpan.innerText = Math.floor(game.energy);
            energyFillDiv.style.width = `${Math.min(100, game.energy)}%`;
            comboCountSpan.innerText = game.combo;
            bonusChatBtn.disabled = (game.bonusChatUses <= 0 || !game.gameActive || game.winFlag);
            renderTasks();
            if(game.totalScore >= 5000 && !game.winFlag && game.completedCount === 15) {
                gameWin();
            }
            if(game.timeLeftSec <= 0 && game.gameActive) gameLose();
            // Сохраняем прогресс
            saveGameToLocal();
        }

        function renderTasks() {
            tasksContainer.innerHTML = '';
            for(let task of game.tasks) {
                const card = document.createElement('div');
                let statusClass = 'task-card';
                if(task.completed) statusClass += ' completed';
                else if(!task.active) statusClass += ' locked';
                else if(task.active && !task.completed) statusClass += ' active';
                card.className = statusClass;
                let rewardShow = task.baseReward;
                if(task.completed) rewardShow = task.baseReward;
                card.innerHTML = `
                    <div class="task-title">
                        <span>🍓 ${task.slot}</span>
                        <span class="slot-badge">🎰 PRAGMATIC</span>
                    </div>
                    <div class="task-desc"><strong>Задание:</strong> ${task.desc || task.condition}</div>
                    <div class="task-reward"><i class="fas fa-star"></i> Награда: ${rewardShow} очков</div>
                    ${!task.completed && task.active && game.gameActive && !game.winFlag ? `<button class="complete-btn" data-id="${task.id}">✅ ВЫПОЛНЕНО</button>` : (task.completed ? '<span style="color:#2d862d;">✔️ Завершено</span>' : (task.active ? '' : '<span style="color:#aaa;">🔒 Заблокировано</span>'))}
                `;
                tasksContainer.appendChild(card);
            }
            // Вешаем слушатели
            document.querySelectorAll('.complete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-id'));
                    completeTask(id);
                });
            });
        }

        function completeTask(id) {
            if(!game.gameActive || game.winFlag) return;
            const task = game.tasks.find(t => t.id === id);
            if(!task || task.completed || !task.active) return;
            // Проверка энергии (требуется 10% для активации, но если задание активно, энергия уже потрачена при активации)
            // Дополнительно проверим, что энергия >=0
            if(game.energy < 0) game.energy = 0;
            // Начисление очков с учётом комбо
            let earned = task.baseReward;
            if(game.doublePointsLeft > 0) {
                earned *= 2;
                game.doublePointsLeft--;
                addChatMessage(`✨ КОМБО! Награда удвоена до ${earned} очков! ✨`);
            }
            game.totalScore += earned;
            task.completed = true;
            task.active = false;
            game.completedCount++;
            // Обновление комбо
            game.combo++;
            if(game.combo === 3) {
                game.doublePointsLeft = 2;
                addChatMessage("🔥 КОМБО 3! Следующие 2 задания дадут ДВОЙНЫЕ очки!", true);
            }
            // Открываем следующее задание (если есть не открытые и не завершённые)
            let anyLocked = false;
            for(let t of game.tasks) {
                if(!t.completed && !t.active) {
                    anyLocked = true;
                    t.active = true;
                    addChatMessage(`🔓 Открыто новое задание: ${t.slot} — ${t.condition}`);
                    break;
                }
            }
            // Если все задания открыты и нет активных, но остались незавершённые (не должно быть)
            addChatMessage(`✅ Задание "${task.slot}" выполнено! +${earned} очков.`);
            updateUI();
            // Проверка победы
            if(game.totalScore >= 5000 && game.completedCount === 15) gameWin();
        }

        // Активация задания требует энергии (при клике на карточку, если она заблокирована)
        // Но чтобы упростить: активные задания уже доступны, энергия тратится только на открытие новых (если бы было ручное открытие).
        // В нашей механике первые 3 задания активны, остальные открываются автоматом после выполнения предыдущих -> энергия не тратится, но можно штрафовать за пропуск? Пока убираем трату энергии, иначе усложним.
        // Переделаем: при выполнении задания восстанавливаем 5 энергии, чтобы стимулировать.
        function addEnergy(amount) {
            game.energy = Math.min(100, game.energy + amount);
            updateUI();
        }

        // Бонус чата: случайный полезный эффект
        function applyChatBonus() {
            if(!game.gameActive || game.winFlag) return;
            if(game.bonusChatUses <= 0) return;
            game.bonusChatUses--;
            const bonuses = [
                { text:"🍬 Ягодный коктейль: +250 очков!", effect:()=>{ game.totalScore += 250; addChatMessage("+250 очков!", true); updateUI(); } },
                { text:"⏳ Заморозка таймера на 3 минуты", effect:()=>{ game.timeLeftSec += 180; updateUI(); addChatMessage("Таймер +3 минуты", true); } },
                { text:"⚡ Энергия восполнена до 100%", effect:()=>{ game.energy = 100; updateUI(); } },
                { text:"🔍 Подсказка: следующий слот Wisdom of Athena горячий", effect:()=>{ addChatMessage("Подсказка: Wisdom of Athena может дать x20!", true); } },
                { text:"🎲 Удвоение комбо: +2 к счётчику комбо", effect:()=>{ game.combo += 2; if(game.combo>=3) game.doublePointsLeft = 2; updateUI(); } }
            ];
            const chosen = bonuses[Math.floor(Math.random() * bonuses.length)];
            addChatMessage(`🎁 БОНУС ЧАТА: ${chosen.text}`, true);
            chosen.effect();
            updateUI();
            if(game.totalScore >= 5000 && game.completedCount === 15) gameWin();
        }

        // Таймер
        function startTimer() {
            if(game.timerInterval) clearInterval(game.timerInterval);
            game.timerInterval = setInterval(() => {
                if(!game.gameActive || game.winFlag) return;
                if(game.timeLeftSec <= 1) {
                    game.timeLeftSec = 0;
                    updateUI();
                    gameLose();
                } else {
                    game.timeLeftSec--;
                    updateUI();
                }
            }, 1000);
        }

        // Восстановление энергии (каждые 10 секунд +5)
        function startEnergyRegen() {
            if(game.energyRegenInterval) clearInterval(game.energyRegenInterval);
            game.energyRegenInterval = setInterval(() => {
                if(!game.gameActive || game.winFlag) return;
                if(game.energy < 100) {
                    game.energy = Math.min(100, game.energy + 5);
                    updateUI();
                }
            }, 10000);
        }

        // Автоматический чат (каждые 12 секунд совет, каждые 10 минут бонус)
        function startAutoChat() {
            if(game.autoChatInterval) clearInterval(game.autoChatInterval);
            let lastBonusTime = Date.now();
            game.autoChatInterval = setInterval(() => {
                if(!game.gameActive || game.winFlag) return;
                // Обычный совет
                const tips = [
                    "Попробуй Wisdom of Athena — там высокие множители.",
                    "Не забывай про комбо! 3 задания подряд удваивают награду.",
                    "Power of Thor: собирай молнии в бонусе.",
                    "Juicy Fruits: фруктовые бонусы идут часто.",
                    "Если сложно — купи бонус в Voodoo Magic."
                ];
                const randomTip = tips[Math.floor(Math.random() * tips.length)];
                addChatMessage(randomTip);
                // Каждые 10 минут (600 секунд реального времени) даём бонус, если есть использование
                if(Date.now() - lastBonusTime > 600000 && game.bonusChatUses > 0) {
                    lastBonusTime = Date.now();
                    applyChatBonus();
                }
            }, 12000);
        }

        function gameWin() {
            if(game.winFlag) return;
            game.winFlag = true;
            game.gameActive = false;
            if(game.timerInterval) clearInterval(game.timerInterval);
            addChatMessage("🎉🍓 ПОБЕДА! ФЕРМА СПАСЕНА! Ты супер-Клубничка! 🍓🎉", true);
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '30%';
            overlay.style.left = '50%';
            overlay.style.transform = 'translate(-50%, -50%)';
            overlay.style.background = '#ffcc66';
            overlay.style.padding = '30px 60px';
            overlay.style.borderRadius = '80px';
            overlay.style.fontSize = '2rem';
            overlay.style.fontWeight = 'bold';
            overlay.style.zIndex = 2000;
            overlay.style.whiteSpace = 'nowrap';
            overlay.innerText = '🍓 ПОБЕДА! ПЛАНТАЦИЯ СПАСЕНА! 🍓';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 4000);
            bonusChatBtn.disabled = true;
        }

        function gameLose() {
            if(!game.gameActive) return;
            game.gameActive = false;
            if(game.timerInterval) clearInterval(game.timerInterval);
            addChatMessage("💀 Время вышло! Плантация погибла... Перезапусти квест.", true);
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed; top:30%; left:50%; transform:translate(-50%,-50%); background:#b33; padding:20px 40px; border-radius:60px; font-size:2rem; z-index:2000; color:white;';
            overlay.innerText = '⏰ ПОРАЖЕНИЕ ⏰';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 3000);
            bonusChatBtn.disabled = true;
        }

        // Сохранение и загрузка
        function saveGameToLocal() {
            const toSave = {
                tasks: game.tasks,
                completedCount: game.completedCount,
                totalScore: game.totalScore,
                timeLeftSec: game.timeLeftSec,
                energy: game.energy,
                combo: game.combo,
                doublePointsLeft: game.doublePointsLeft,
                bonusChatUses: game.bonusChatUses,
                gameActive: game.gameActive,
                winFlag: game.winFlag,
                version: 2
            };
            localStorage.setItem('clubburryQuest', JSON.stringify(toSave));
        }

        function loadGameFromLocal() {
            const raw = localStorage.getItem('clubburryQuest');
            if(!raw) return false;
            try {
                const data = JSON.parse(raw);
                if(data.version !== 2) return false;
                game.tasks = data.tasks;
                game.completedCount = data.completedCount;
                game.totalScore = data.totalScore;
                game.timeLeftSec = data.timeLeftSec;
                game.energy = data.energy;
                game.combo = data.combo;
                game.doublePointsLeft = data.doublePointsLeft;
                game.bonusChatUses = data.bonusChatUses;
                game.gameActive = data.gameActive;
                game.winFlag = data.winFlag;
                if(game.winFlag) game.gameActive = false;
                return true;
            } catch(e) { return false; }
        }

        function resetGame() {
            localStorage.removeItem('clubburryQuest');
            location.reload();
        }

        // Инициализация
        function init() {
            const loaded = loadGameFromLocal();
            if(!loaded) {
                // Первые 3 задания активны
                for(let i=0; i<3 && i<game.tasks.length; i++) {
                    game.tasks[i].active = true;
                }
                game.totalScore = 0;
                game.completedCount = 0;
                game.timeLeftSec = 90*60;
                game.energy = 100;
                game.combo = 0;
                game.doublePointsLeft = 0;
                game.bonusChatUses = 3;
                game.gameActive = true;
                game.winFlag = false;
            } else {
                if(game.winFlag || !game.gameActive) {
                    // можно предложить сброс
                    if(confirm("Обнаружена завершённая игра. Начать заново?")) resetGame();
                }
            }
            updateUI();
            startTimer();
            startEnergyRegen();
            startAutoChat();
            bonusChatBtn.addEventListener('click', applyChatBonus);
            window.addEventListener('beforeunload', () => saveGameToLocal());
            addChatMessage("🍓 Добро пожаловать! Твоя цель — 5000 очков за 90 минут. Выполняй задания в реальных слотах Pragmatic, нажимай кнопку ВЫПОЛНЕНО. Комбо ускорит прогресс!");
        }

        init();
    })();
</script>
</body>
</html>
