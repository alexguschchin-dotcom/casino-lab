<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Империя знаний — Соревновательная викторина</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="map-bg"></div>
    <div class="clouds"></div>
    <div class="sparkles"></div>
    <div id="toast" class="toast hidden"></div>
    <div id="flash-overlay" class="flash-overlay hidden"></div>

    <div class="game-container">
        <header class="header">
            <h1 class="title">
                <i class="fas fa-globe-americas"></i> 
                Империя знаний
                <i class="fas fa-compass"></i>
            </h1>
            <div class="level-indicator">Вопрос <span id="current-q">1</span>/<span id="total-q">39</span></div>
            <button id="sound-toggle" class="sound-btn"><i class="fas fa-volume-up"></i></button>
        </header>

        <!-- Прогресс в виде карты с маркерами -->
        <div class="journey-map">
            <div class="map-markers" id="map-markers"></div>
            <div class="map-progress-bar">
                <div class="map-track" id="map-track"></div>
            </div>
        </div>

        <!-- Карточка вопроса с анимацией свитка -->
        <div class="question-card scroll-animation" id="question-card">
            <div class="question-text" id="question-text">Загрузка...</div>
            <div class="options" id="options"></div>
        </div>

        <!-- Таблица лидеров в реальном времени -->
        <div class="leaderboard">
            <h3><i class="fas fa-trophy"></i> Таблица лидеров</h3>
            <div id="leaderboard-list"></div>
        </div>

        <!-- Карточки игроков -->
        <div class="scoreboard">
            <div class="player-card" data-player="Alex">
                <i class="fas fa-user-astronaut avatar"></i>
                <span class="player-name">Алексей</span>
                <div class="streak-indicator" id="streak-Alex">🔥 0</div>
                <span class="player-score" id="score-Alex">0</span>
                <span class="player-coins" id="coins-Alex">💰 0</span>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Alex" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Alex" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Alex">Ответить</button>
            </div>
            <div class="player-card" data-player="Vika">
                <i class="fas fa-user-ninja avatar"></i>
                <span class="player-name">Вика</span>
                <div class="streak-indicator" id="streak-Vika">🔥 0</div>
                <span class="player-score" id="score-Vika">0</span>
                <span class="player-coins" id="coins-Vika">💰 0</span>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Vika" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Vika" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Vika">Ответить</button>
            </div>
            <div class="player-card" data-player="Batya">
                <i class="fas fa-user-tie avatar"></i>
                <span class="player-name">Батя</span>
                <div class="streak-indicator" id="streak-Batya">🔥 0</div>
                <span class="player-score" id="score-Batya">0</span>
                <span class="player-coins" id="coins-Batya">💰 0</span>
                <div class="bonus-buttons">
                    <button class="bonus-btn ask-chat" data-player="Batya" data-bonus="askChat" disabled>💬 Спросить чат</button>
                    <button class="bonus-btn skip" data-player="Batya" data-bonus="skipQuestion" disabled>⏭️ Пропустить</button>
                </div>
                <button class="answer-btn" data-player="Batya">Ответить</button>
            </div>
        </div>

        <div class="control-panel">
            <button id="reset-btn" class="btn-reset">🔄 Новая игра</button>
        </div>
    </div>

    <!-- Модалки -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <button id="close-modal" class="btn-close">Продолжить</button>
        </div>
    </div>

    <div id="hint-modal" class="modal hidden">
        <div class="modal-content">
            <h2>💡 Подсказка чата</h2>
            <p id="hint-text"></p>
            <button id="close-hint" class="btn-close">Понятно</button>
        </div>
    </div>

    <div id="gameover-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Игра окончена</h2>
            <div id="final-scores"></div>
            <button id="new-game-btn" class="btn-neon">Новая игра</button>
        </div>
    </div>

    <!-- Аудио элементы -->
    <audio id="sound-bg" loop preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_1c6b9b6c1c.mp3?filename=epic-adventure-112191.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-scroll" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_7c3c9c1c1c.mp3?filename=scroll-112192.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-click" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_1c6b9b6c1c.mp3?filename=click-112193.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-correct" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_7c3c9c1c1c.mp3?filename=correct-6033.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-wrong" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_1c6b9b6c1c.mp3?filename=wrong-47985.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-bonus" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_3f3f3f3f3f.mp3?filename=bonus-101191.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-transition" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/06/24/audio_6f6f6f6f6f.mp3?filename=footsteps-112194.mp3" type="audio/mpeg">
    </audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
